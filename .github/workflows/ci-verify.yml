name: ci-verify

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]
        harness_profile: [harness-legacy, harness-new]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Run Maven Verify
        run: mvn --batch-mode --no-transfer-progress clean verify -P${{ matrix.harness_profile }}

      - name: Verify exec-plans (non-template) mention plan_vs_impl
        if: matrix.harness_profile == 'harness-legacy' && matrix.java == '17'
        run: bash scripts/verify-exec-plans.sh

      - name: Advisory doc gates (func / 04-api-docs)
        if: github.event_name == 'pull_request' && matrix.harness_profile == 'harness-legacy' && matrix.java == '17'
        continue-on-error: true
        run: bash scripts/verify-doc-gates.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-java-${{ matrix.java }}-${{ matrix.harness_profile }}
          path: target/surefire-reports/**

      - name: Upload SpotBugs Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports-java-${{ matrix.java }}-${{ matrix.harness_profile }}
          path: target/spotbugsXml.xml

      - name: Upload JaCoCo Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports-java-${{ matrix.java }}-${{ matrix.harness_profile }}
          path: target/site/jacoco/**

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Dependency Security Scan
        run: mvn --batch-mode --no-transfer-progress clean verify -Psecurity-scan

      - name: Upload Dependency Check Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
